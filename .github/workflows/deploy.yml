name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Restore wrangler OAuth config
        run: |
          mkdir -p ~/.wrangler/config
          echo "${{ secrets.WRANGLER_CONFIG }}" | base64 -d > ~/.wrangler/config/default.toml
          chmod 600 ~/.wrangler/config/default.toml

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=ascii-canvas --branch main
